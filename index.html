<!DOCTYPE html>
<html lang="en">
<head>

<title>ZX10R | Ninja Wow Reaction</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.7);
backdrop-filter:blur(12px);
z-index:999;
}

.logo{
font-size:28px;
font-weight:700;
color:#39ff14;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
transition:.3s.gallery{
padding:100px 8%;
text-align:center;
}

.gallery h2{
font-size:42px;
color:#39ff14;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:#111;
border-radius:15px;
overflow:hidden;
transition:.4s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 20px #39ff14;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h3{
padding:20px;
}

.specs{
padding:100px 8%;
text-align:center;
background:#0b0b0b;
}

.specs h2{
font-size:42px;
color:#39ff14;
margin-bottom:40px;
}

.spec-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.box{
background:#151515;
padding:30px;
border-radius:15px;
transition:.3s;
}

.box:hover{
transform:scale(1.05);
box-shadow:0 0 15px #39ff14;
}

footer{
background:#000;
padding:40px;
text-align:center;
}

</style>
</head>

<body>

<header>
<div class="logo">ZX10R</div>

<nav<div class="card">
<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=800&q=80">
<h3>Rear View</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1449965408869-eaa3f722e40d?auto=format&fit=crop&w=800&q=80">
<h3>Night Ride</h3>
</div>

</div>

</section>

<section class="specs" id="specs">

<h2>Specifications</h2>

<div class="spec-grid">

<div class="box">
<h3>Engine</<section id="contact" style="padding:100px 8%;text-align:center;background:#0b0b0b;">

<h2 style="font-size:42px;color:#39ff14;">Contact</h2>

<p style="margin:20px 0;font-size:18px;">
Welcome to Ninja Wow Reaction.<br>
Follow for ZX10R videos, superbike content and rides.
</p>

<a href="https://youtube.com/" target="_blank" class="btn">
Visit YouTube
</a>

</section>

<footer>

<h2 style="color:#39ff14;">Ninja Wow Reaction</h2>

<p style="margin-top:15px;">
🏍️ Kawasaki ZX10R Premium Website
</p>

<p style="margin-top:10px;">
© 2026 All Rights Reserved
</p>

</footer>

<script>

document.querySelectorAll(".card").forEach(card=>{

card.style.opacity="0";
card.style.transform="translateY(50px)";
card.style.transition="0.8s";

});

window.addEventListener("scroll",()=>{

document.querySelectorAll(".card").forEach(card=>{

const top=card.getBoundingClientRect().top;

if(top<window.innerHeight-100){

card.style.opacity="1";
card.style.transform="translateY(0)";

}

});

});

</script>

</body>
</html>
